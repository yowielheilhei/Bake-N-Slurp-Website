<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Menu | Bake 'n Slurp</title>
        <link rel="stylesheet" href="global.css">
        <link rel="stylesheet" href="contact.css">
        <script src="components.js"></script>
    </head>
<body>
    <div id="page-loader" class="loader-container">
        <div class="spinner"></div>
    </div>
    <bake-header></bake-header>
    <main class="container">
        <div class="banner">
            <img src="images/contact-hero.jpg" alt="Connect with Us">
            <h2>CONNECT WITH US</h2>
        </div>
        <div class="contact-container">
            <div class="contact-left">
                <div class="contact-info-grid">
                    <div class="info-box">
                        <p><strong>Phone</strong></p>
                        <p>09202649380</p>
                    </div>
                    <div class="info-box">
                        <p><strong>Facebook</strong></p>
                        <p>Bake n' Slurp</p>
                    </div>
                    <div class="info-box">
                        <p><strong>Email</strong></p>
                        <p>resalvematienzo@gmail.com</p>
                    </div>
                    <div class="info-box">
                        <p><strong>Our Shop</strong></p>
                        <p>Balisong, Taal</p>
                    </div>
                </div>
                <div class="map-placeholder">
                    <img src="images/map.jpg" alt="Map Location">
                </div>
            </div>
            <div class="contact-form">
                <h3>GET IN TOUCH</h3>
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                <form>
                    <div class="form-group">
                        <input type="text" placeholder="Surname, First Name Middle Initial">
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="example08@gmail.com">
                    </div>
                    <div class="form-group">
                        <input type="text" placeholder="Subject">
                    </div>
                    <div class="form-group">
                        <textarea rows="5" placeholder="Message"></textarea>
                    </div>
                    <button type="submit" class="send-btn">Send Now</button>
                </form>
            </div>
        </div>
    </main>
    <bake-footer></bake-footer>
</html>
