<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Bake 'n Slurp</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="menu.css">
    <script src="components.js"></script>
    
    <script src="menu.js"></script>
</head>
<body>

    <div id="page-loader" class="loader-container">
        <div class="spinner"></div>
    </div>
    <bake-header></bake-header>
    
    <main class="container">
        <div class="banner">
            <img src="assets/images/backgroundpicture/banner.png" alt="Products">
            <h2>PRODUCTS</h2>
        </div>

        <div class="menu-layout">
            <aside class="sidebar">
                <h3>MENU</h3>
                <p>PRODUCT CATEGORIES</p>
                <hr>
                <ul id="category-list">
                    <li class="active" data-category="all">All Products</li>
                    <li data-category="cakes">Cakes</li>
                    <li data-category="sandwiches">Sandwiches</li>
                    <li data-category="treats">Treats</li>
                    <li data-category="drinks">Drinks</li>
                </ul>
            </aside>

            <section class="menu-content">
                <div class="menu-header">
                    <h2 id="category-title">All Products</h2>
                    <input type="text" id="search-input" placeholder="Search" class="search-bar">
                </div>
                
                <div class="product-grid" id="product-grid"></div>
                
            </section>
        </div>
    </main>
    
    <bake-footer></bake-footer>
</body>
</html>
